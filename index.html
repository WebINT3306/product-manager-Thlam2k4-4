<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm UET</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --error: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-body);
      background-image: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.05) 0px, transparent 50%), 
                        radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.05) 0px, transparent 50%);
      min-height: 100vh;
      color: var(--text-main);
      padding: 50px 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 40px;
      color: var(--text-dark);
      letter-spacing: -1px;
    }

    h1 span {
      color: var(--primary);
    }

    /* ===== CARD COMMON ===== */
    .glass-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
      margin-bottom: 30px;
    }

    .glass-card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .glass-card h2::before {
      content: "";
      width: 4px;
      height: 20px;
      background: var(--primary);
      border-radius: 10px;
    }

    /* ===== FORM STYLES ===== */
    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .form-group input {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f1f5f9;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .btn-container {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    #btn-add {
      padding: 12px 30px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #btn-add:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
    }

    /* ===== TABLE STYLES ===== */
    .table-container {
      overflow-x: auto;
    }

    table#product-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    #product-table thead th {
      padding: 16px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border);
    }

    #product-table thead th.sortable {
      cursor: pointer;
    }

    #product-table thead th.sortable:hover {
      color: var(--primary);
    }

    #product-table tbody td {
      padding: 16px;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--border);
    }

    #product-table tbody tr:hover td {
      background: #f8fafc;
    }

    #product-table tbody tr:last-child td {
      border-bottom: none;
    }

    .price-text {
      font-weight: 600;
      color: var(--primary);
    }

    .qty-badge {
      display: inline-block;
      padding: 4px 12px;
      background: #e0e7ff;
      color: var(--primary);
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* ===== VALIDATION ===== */
    .error-msg {
      color: var(--error);
      font-size: 0.75rem;
      margin-top: 6px;
      min-height: 18px;
      font-weight: 500;
    }

    @media (max-width: 800px) {
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 500px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Quản lý <span>Sản phẩm</span></h1>

    <section class="glass-card">
      <h2>Thêm sản phẩm mới</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="input-name">Tên sản phẩm</label>
          <input type="text" id="input-name" placeholder="Ví dụ: Bàn phím cơ...">
          <div class="error-msg" id="error-name"></div>
        </div>
        <div class="form-group">
          <label for="input-category">Danh mục</label>
          <input type="text" id="input-category" placeholder="Điện tử, Gia dụng...">
        </div>
        <div class="form-group">
          <label for="input-price">Giá (VNĐ)</label>
          <input type="number" id="input-price" placeholder="0">
          <div class="error-msg" id="error-price"></div>
        </div>
        <div class="form-group">
          <label for="input-quantity">Số lượng</label>
          <input type="number" id="input-quantity" placeholder="0">
          <div class="error-msg" id="error-quantity"></div>
        </div>
        <div class="btn-container">
          <button id="btn-add">Xác nhận thêm</button>
        </div>
      </div>
    </section>

    <section class="glass-card">
      <h2>Danh sách kho hàng</h2>
      <div class="table-container">
        <table id="product-table">
          <thead>
            <tr>
              <th style="width: 80px;">STT</th>
              <th class="sortable" id="th-name">Tên sản phẩm ↕</th>
              <th>Danh mục</th>
              <th>Đơn giá</th>
              <th>Số lượng</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    // === Logic JS giữ nguyên hoàn toàn như bản gốc bạn cung cấp ===
    var products = [];
    var sortAsc = true;

    function renderTable() {
      var tbody = document.querySelector('#product-table tbody');
      tbody.innerHTML = '';
      for (var i = 0; i < products.length; i++) {
        var p = products[i];
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + (i + 1) + '</td>' +
          '<td style="font-weight: 500;">' + escapeHtml(p.name) + '</td>' +
          '<td style="color: var(--text-muted);">' + escapeHtml(p.category) + '</td>' +
          '<td class="price-text">' + formatPrice(p.price) + '</td>' +
          '<td><span class="qty-badge">' + p.quantity + '</span></td>';
        tbody.appendChild(tr);
      }
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatPrice(price) {
      return Number(price).toLocaleString('vi-VN') + ' ₫';
    }

    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        products = JSON.parse(xhr.responseText);
        renderTable();
      }
    };
    xhr.open('GET', 'products.json');
    xhr.send();

    var thName = document.getElementById('th-name');
    thName.addEventListener('click', function() {
      products.sort(function(a, b) {
        var nameA = a.name.toLowerCase();
        var nameB = b.name.toLowerCase();
        if (nameA < nameB) return sortAsc ? -1 : 1;
        if (nameA > nameB) return sortAsc ? 1 : -1;
        return 0;
      });
      thName.textContent = 'Tên sản phẩm ' + (sortAsc ? '▲' : '▼');
      sortAsc = !sortAsc;
      renderTable();
    });

    document.getElementById('btn-add').addEventListener('click', function() {
      var nameInput = document.getElementById('input-name');
      var categoryInput = document.getElementById('input-category');
      var priceInput = document.getElementById('input-price');
      var quantityInput = document.getElementById('input-quantity');

      var name = nameInput.value.trim();
      var category = categoryInput.value.trim();
      var price = parseFloat(priceInput.value);
      var quantity = parseInt(quantityInput.value, 10);

      var valid = true;
      var errorName = document.getElementById('error-name');
      var errorPrice = document.getElementById('error-price');
      var errorQuantity = document.getElementById('error-quantity');

      errorName.textContent = '';
      errorPrice.textContent = '';
      errorQuantity.textContent = '';

      if (!name || name.length < 3) {
        errorName.textContent = 'Tên sản phẩm tối thiểu 3 ký tự.';
        valid = false;
      }
      if (isNaN(price) || price <= 0) {
        errorPrice.textContent = 'Giá phải lớn hơn 0.';
        valid = false;
      }
      if (isNaN(quantity) || quantity < 1 || !Number.isInteger(quantity)) {
        errorQuantity.textContent = 'Số lượng phải là số nguyên ≥ 1.';
        valid = false;
      }

      if (!valid) return;

      products.push({
        id: products.length + 1,
        name: name,
        category: category || 'Chưa phân loại',
        price: price,
        quantity: quantity
      });

      renderTable();

      nameInput.value = '';
      categoryInput.value = '';
      priceInput.value = '';
      quantityInput.value = '';
    });
  </script>
</body>
</html>
